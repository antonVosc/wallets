services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: sh /app/scripts/migrate.sh
    environment:
      DATABASE_URL: postgresql+asyncpg://wallet:wallet@db:5432/wallet_db
      DATABASE_URL_SYNC: postgresql://wallet:wallet@db:5432/wallet_db
      PGPASSWORD: wallet
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://wallet:wallet@db:5432/wallet_db
      DATABASE_URL_SYNC: postgresql://wallet:wallet@db:5432/wallet_db
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  test:
    build: .
    command: python -m pytest /app/tests/ -v --cov=app --cov-report=term-missing -p no:cacheprovider
    environment:
      DATABASE_URL: postgresql+asyncpg://wallet:wallet@db:5432/wallet_test
      DATABASE_URL_SYNC: postgresql://wallet:wallet@db:5432/wallet_test
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - test

volumes:
  postgres_data:
